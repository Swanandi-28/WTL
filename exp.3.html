<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset=" UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>My WebPage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Swanandi's Website</div>
        <nav>
            <a href="#home">home</a>
            <a href="#hobbies">hobbies</a>
            <a href="#skills">skills</a>
            <a href="#contact">contact</a>
        </nav>
    </header>
    
    <section id="home" class="home">
        <h1>Welcome to Swanandi's WebPage</h1>
        <p> This is a sample page that demonstrates basic structures.</p>
    </section>
    
    <section id="hobbies" class="hobbies">
        <h2>My Hobbies</h2>
        <div class="container"> 
            <div class="hobby-card">
                <h3>Playing Badminton</h3>
                <h3>Listening to Music</h3>
                <h3>Painting</h3>
            </div>
        </div>
    </section>
    
    <section id="skills" class="skills">
        <h2>Skills</h2>
        <div class="container">
            <div class="skill-card">
                <h3>Frontend Development</h3>
                <h3>UI/UX Design</h3>
                <h3>Full Stack Development</h3>
            </div>
        </div>
    </section>

    <section id="contact" class="contact">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="text" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
<style>
    *{
    width: 100%;
    background-color: #05043c;
    color: rgb(130, 184, 204);
    text-align: center;
    padding:15px;
}
    footer {
    background-color: #333;
    color: white;
    padding: 10px;
    text-align: center;
}
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Navbar */
header{
    
}

</style>
</body>
</html>
